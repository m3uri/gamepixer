    function generar() {
        const contenedor = document.getElementById('lista-precios');
        const marcas = [...new Set(productos.map(p => p.m))];
        
        contenedor.innerHTML = "";
        marcas.forEach(marca => {
            let mClass = marca.toLowerCase() === 'iphone' ? 'apple' : marca.toLowerCase();
            let html = `
                <div class="marca-grupo" data-marca="${marca.toLowerCase()}">
                    <div class="marca-header bg-${mClass}">${marca}</div>
                    <div class="tabla-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Modelo y Calidad</th>
                                    <th>Precio</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            productos.filter(p => p.m === marca).forEach(item => {
                html += `
                    <tr class="fila">
                        <td>${item.d}</td>
                        <td class="precio">$${item.p}</td>
                        <td><a href="https://wa.me/${nroTelef}?text=Hola, consulto por: ${item.m} ${item.d}" class="btn-ws" target="_blank">Consultar</a></td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            contenedor.innerHTML += html;
        });
    }

    function filtrar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const filas = document.querySelectorAll('.fila');
        
        filas.forEach(f => {
            const texto = f.innerText.toLowerCase();
            f.style.display = texto.includes(busqueda) ? "" : "none";
        });

        document.querySelectorAll('.marca-grupo').forEach(g => {
            const visibles = g.querySelectorAll('.fila[style=""]').length;
            g.style.display = visibles > 0 ? "block" : "none";
        });
    }
