<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GAMEPIXER</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>GAMEPIXER</h1>
<p>CONTRASEÑA: GAMEPIXER</p>
</header>

<!-- Filtros por categoría -->
<div class="filtros" style="text-align:center; margin:20px 0;">
  <button onclick="filtrarCategoria('Todos')">Todos</button>
  <button onclick="filtrarCategoria('Shooter')">Shooter</button>
  <button onclick="filtrarCategoria('Aventura')">Aventura</button>
  <button onclick="filtrarCategoria('Pelea')">Pelea</button>
  <button onclick="filtrarCategoria('Horror')">Horror</button>
  <button onclick="filtrarCategoria('Estrategia')">Estrategia</button>
  <button onclick="filtrarCategoria('Plataformas')">Plataformas</button>
  <button onclick="filtrarCategoria('Metroidvania')">Metroidvania</button>
  <button onclick="filtrarCategoria('Survival')">Survival</button>
  <button onclick="filtrarCategoria('Terror')">Terror</button>
</div>

<div class="buscador" style="text-align:center; margin-bottom:20px;">
<input type="text" id="buscador" placeholder="Buscar juego...">
</div>

<!-- Contenedor donde se insertan los juegos automáticamente -->
<div class="contenedor" id="contenedor-juegos">
</div>

<footer>
<p>© 2026 Juegos Full PC</p>
</footer>

<script src="script.js"></script>
</body>
</html>
